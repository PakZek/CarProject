name: JDM RSS Hunter
on:
  schedule:
    - cron: '0 7 * * *'  # 8h CET = 7h UTC quotidien
    - cron: '0 */1 * * *'  # Toutes les heures pour top deals
  workflow_dispatch:  # Bouton "Run" manuel
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install -r requirements.txt
    - name: Run hunter
      run: python jdm_hunter.py
    - name: Commit RSS
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: '🤖 JDM RSS Update [{{ github.run_id }}] - {{ github.event.head_commit.message }}'
        file_pattern: '*.xml'
